<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapitre 1</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0b0b0b;
      font-family:Arial, sans-serif;
      color:white;
    }

    /* CONTENEUR PRINCIPAL */
    .webtoon{
      width:100%;
      max-width:1100px;
      margin:auto;
      padding:40px 20px;
    }

    /* TITRE */
    .title{
      text-align:center;
      font-size:40px;
      color:#ffcc00;
      margin-bottom:40px;
      letter-spacing:3px;
    }

    /* GRILLE DES PANELS */
    .panels{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:30px;
    }

    /* PANEL */
    .panel{
      position:relative;
      background:#111;
      border:2px solid #ffcc00;
      border-radius:20px;
      overflow:hidden;
      transition:0.3s;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    .panel:hover{
      transform:scale(1.03);
    }

    /* IMAGE */
    .panel img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    /* NARRATION */
    .narration{
      position:absolute;

      top:20px;
      left:20px;

      background:#d7de70;
      color:black;

      padding:15px 20px;

      font-size:28px;
      font-weight:bold;

      border-radius:5px;

      max-width:70%;
    }

    /* BULLE */
    .speech{
      position:absolute;

      top:20px;
      right:20px;

      width:220px;

      background:white;
      color:black;

      padding:20px;

      border-radius:50%;

      text-align:center;

      font-size:22px;
      font-weight:bold;

      border:3px solid black;
    }

    /* POINTE BULLE */
    .speech::after{
      content:"";

      position:absolute;

      bottom:-25px;
      left:50%;

      transform:translateX(-50%);

      border-width:25px 20px 0;
      border-style:solid;

      border-color:white transparent transparent transparent;
    }

    /* RESPONSIVE TELEPHONE */
    @media(max-width:800px){

      .panels{
        grid-template-columns:1fr;
      }

      .title{
        font-size:30px;
      }

      .narration{
        font-size:20px;
      }

      .speech{
        width:180px;
        font-size:18px;
      }
    }
    /* Flèche bas */
.fleche-bas {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 3rem;
    color: #000;
    text-decoration: none;
    transition: 0.2s;
}

.fleche-bas:hover {
    transform: translateX(-50%) scale(1.2);
}

  </style>
</head>

<body>

  <div class="webtoon">

    <h1 class="title">CHAPITRE 1</h1>

    <div class="panels">

      <!-- PANEL 1 -->
      <div class="panel">

        <img src="image/1.png" alt="">

        <!-- NARRATION -->
        <div class="narration">
        MARK S’ÉLANÇA
        </div>

      </div>

      <!-- PANEL 2 -->
      <div class="panel">

        <img src="image/2.png" alt="">

                    <!-- BULLE -->
        <div class="speech">
         TROP LENT !
        </div>

      </div>

      <!-- PANEL 3 -->
      <div class="panel">

        <img src="image/3.png" alt="">

                    <!-- BULLE -->
        <div class="speech">
    TROP FAIBLE !
        </div>

      </div>
      <!-- PANEL 4 -->
      <div class="panel">
        <img src="image/5.png" alt="">

            <!-- BULLE -->
        <div class="speech">
         Tu ne seras jamais à la hauteur de ton père !Tant que tu n'accepteras pas de devenir un vrai Viltrumite!
        </div>
    
      <!-- PANEL 5 -->
      <div class="panel">
        <img src="images/page5.jpg" alt="">
      </div>

      <!-- PANEL 6 -->
      <div class="panel">
        <img src="images/page6.jpg" alt="">
      </div>

      <!-- PANEL 7 -->
      <div class="panel">
        <img src="images/page7.jpg" alt="">
      </div>

      <!-- PANEL 8 -->
      <div class="panel">
        <img src="images/page8.jpg" alt="">
      </div>

    </div>

  </div>

    <a href="page_7.html" class="fleche-bas">⬇ page suivante</a>

</body>
</html>
